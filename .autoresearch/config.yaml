# Framework configuration. Loaded once per process by utils/settings.py.
#
# Single source of truth for: DSL fallback, profiler defaults, autotune
# behaviour, precision tolerances, worker daemon defaults, batch-verify
# timeouts, and Claude-side script aliasing. Every consumer routes
# through utils.settings (no hand-built tables inside Python modules).
#
# DSL → backend / device_type live in the verifier registry, surfaced
# through `ar_cli.py env list-dsls`. arch is derived from hardware
# (local: `ar_cli.py env detect`; remote: worker /api/v1/status via
# `ar_cli.py env detect --worker-url`). None appear here.

# Fallback DSL when scaffold.py is invoked directly without --dsl
# (e.g. reconstructing an old task from task.yaml). The /autoresearch
# slash command no longer uses this — parse_args.py rejects missing
# --dsl up front so the LLM never silently picks a DSL.
default_dsl: triton_ascend

# --------------------------------------------------------------------
# Profiler — user-facing latency measurement.
# --------------------------------------------------------------------
# Defaults for the per-shape `profiler_npu(warmup=..., active=...)`
# call that produces the `latency_us` written to progress.json. Each
# task.yaml may override per-task via `eval.warmup_times`,
# `eval.run_times`, and `eval.timeout`.
profiler:
  warmup_times: 10
  run_times: 100
  eval_timeout: 600              # seconds per shape

# --------------------------------------------------------------------
# Autotune — distinct from `profiler` above.
# --------------------------------------------------------------------
# triton.autotune only needs to relative-order configs (pick a winner
# among the 4 triton.Config candidates a kernel declares). It does NOT
# need profiler-grade timing. Lightweight settings here cut wallclock
# significantly on multi-shape autotune kernels (pad, etc.) while
# preserving final-measurement accuracy (which still goes through
# `profiler` above).
#
# Historical default was profiler_npu(warmup=5, active=30) + per-iter
# L2-clear — measurement-grade work, wasted on autotune. Default is now
# sync_timer (torch.npu.synchronize + time.perf_counter, no msprof).
# patches/triton_autotune_patch.py reads these on import.
autotune:
  # "sync_timer"  — sub-second/trial (default).
  # "profiler_npu" — msprof-grade timing, seconds/trial (legacy).
  benchmark_method: sync_timer
  benchmark_warmup: 1
  benchmark_active: 3
  benchmark_clear_l2: false   # profiler_npu only; sync_timer ignores
  # Per-(triton fn, autotune-key) winner cache. First round populates
  # `~/.autoresearch_cache/autotune/<fn_name>_<src_hash>.json`;
  # subsequent rounds load it into `Autotuner.cache` so the bench
  # loop is skipped entirely. Kernel-source change invalidates via
  # src_hash; nothing else needs manual eviction.
  disk_cache_enabled: true

# --------------------------------------------------------------------
# Precision tolerance — mirrors `utils/correctness.py:_TOLERANCE_BY_DTYPE_NAME`.
# --------------------------------------------------------------------
# Layered (strict + relaxed) tolerance, CANN MARE/MERE-aligned.
# Per dtype: (rtol, atol, outlier_rtol, outlier_atol, outlier_ratio).
# Editing this is the single place to retune correctness — both
# `compare_outputs` (in-process) and the eval-package tarball pick up
# the new values automatically.
precision:
  float32:
    rtol: 1.22e-4
    atol: 1.0e-5
    outlier_rtol: 1.22e-3
    outlier_atol: 1.0e-4
    outlier_ratio: 0.001
  float16:
    rtol: 9.77e-4
    atol: 1.0e-3
    outlier_rtol: 9.77e-3
    outlier_atol: 1.0e-2
    outlier_ratio: 0.005
  bfloat16:
    rtol: 7.81e-3
    atol: 1.0e-2
    outlier_rtol: 7.81e-2
    outlier_atol: 1.0e-1
    outlier_ratio: 0.010

# --------------------------------------------------------------------
# Worker daemon defaults — `ar_cli.py worker --start`.
# --------------------------------------------------------------------
worker:
  port: 9001
  host: 0.0.0.0

# --------------------------------------------------------------------
# `batch/verify.py` per-op subprocess timeouts.
# --------------------------------------------------------------------
batch_verify:
  tier1_timeout: 30
  tier2_timeout: 600

# --------------------------------------------------------------------
# Worker-only modules — skipped during static code-check import probe.
# --------------------------------------------------------------------
# The local dev box typically lacks these; worker-side verify catches
# any real import error.
worker_only_modules:
  - triton
  - torch_npu
  - torch_npu_extension

# --------------------------------------------------------------------
# Hallucinated-script redirects for hooks/guard_bash.py.
# --------------------------------------------------------------------
# Common name guesses → the real script Claude should use. Verify-style
# invocations all map to `ar_cli.py verify` (single sentinel-tagged
# JSON CLI; see ar_cli.py).
hallucinated_scripts:
  eval.py: ar_cli.py verify
  eval_wrapper.py: ar_cli.py verify
  run_eval.py: ar_cli.py verify
  verify.py: ar_cli.py verify
  run.py: ar_cli.py verify
  profile.py: ar_cli.py verify
  check.py: quick_check.py
  test.py: quick_check.py
  hw_detect.py: ar_cli.py env detect
