# Framework reference tables. Loaded once per process by settings.py.
#
# DSL is the only user-visible classifier. backend / device_type are pure
# functions of DSL (see `ar_cli.py env list-dsls` — the canonical table
# lives in the verifier registry, surfaced through that CLI). arch is
# derived from hardware (local: `ar_cli.py env detect`; remote: worker
# /api/v1/status via `ar_cli.py env detect --worker-url`).

# Fallback DSL when scaffold.py is invoked directly without --dsl
# (e.g. reconstructing an old task from task.yaml). The /autoresearch
# slash command no longer uses this — parse_args.py rejects missing
# --dsl up front so the LLM never silently picks a DSL.
default_dsl: triton_ascend

# Modules that live only on the remote worker (NPU / GPU rig). Static code
# check skips import availability for these — the local dev box typically
# lacks them. Worker-side verify catches any real import error.
worker_only_modules:
  - triton
  - torch_npu
  - torch_npu_extension

# Common hallucinated script names → the real script Claude should use.
# hook_guard_bash flags these early with a targeted error rather than a
# generic "unknown script" rejection. Verify-style invocations all map to
# `ar_cli.py verify` (single sentinel-tagged JSON CLI; see ar_cli.py).
hallucinated_scripts:
  eval.py: ar_cli.py verify
  eval_wrapper.py: ar_cli.py verify
  run_eval.py: ar_cli.py verify
  verify.py: ar_cli.py verify
  run.py: ar_cli.py verify
  profile.py: ar_cli.py verify
  check.py: quick_check.py
  test.py: quick_check.py
  hw_detect.py: ar_cli.py env detect
